<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حجز مسبح العائلات فقط بالشرقية</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f8ff; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 600px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin: auto; }
        h1 { color: #0077b6; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn-submit { width: 100%; background-color: #0096c7; color: white; border: none; padding: 14px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .btn-submit:hover { background-color: #0077b6; }
        .features { display: flex; justify-content: space-around; margin-bottom: 25px; background: #e2f1ff; padding: 10px; border-radius: 8px; font-size: 14px; }
        .error-msg { color: #d9534f; font-size: 14px; margin-top: 5px; display: none; font-weight: bold; }
        .booked-list { background: #fff3cd; border: 1px solid #ffeeba; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; }
        
        /* تصميم زر خرائط جوجل المرتبط بإحداثياتك */
        .btn-maps { width: 100%; background-color: #2ec4b6; color: white; border: none; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; text-align: center; text-decoration: none; display: inline-block; margin-bottom: 20px; transition: 0.3s; box-sizing: border-box; box-shadow: 0 3px 6px rgba(0,0,0,0.1); }
        .btn-maps:hover { background-color: #0f9f90; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏊‍♂️ مسبح العائلات فقط بالشرقية</h1>
    <p style="text-align: center; color: #666;">راحة، أمان، وخصوصية تامة لعائلتك</p>
    
    <!-- 📍 تم ربط الزر بإحداثيات موقع مسبحك الدقيقة مباشرة -->
    <a href="https://google.com" target="_blank" class="btn-maps">📍 اضغط هنا لفتح موقع المسبح على خرائط Google</a>
    
    <div class="features">
        <span>🔒 خصوصية 100%</span>
        <span>🌊 تجديد ماء المسبح</span>
        <span>👶 مساحة العشب الطبيعي للعب</span>
    </div>

    <!-- قسم يعرض للزبون الأيام المحجوزة مسبقاً للعلم -->
    <div class="booked-list">
        <strong>⚠️ تنبيه:</strong> الأيام التالية ممتلئة تماماً وغير متاحة للحجز:
        <ul id="bookedDatesText" style="margin: 5px 0 0 0; padding-right: 20px;">
            <!-- سيتم ملء الأيام تلقائياً من البرمجة بالأسفل -->
        </ul>
    </div>

    <form id="bookingForm">
        <div class="form-group">
            <label for="name">اسم المستأجر (الكامل):</label>
            <input type="text" id="name" required placeholder="أدخل الإسم واللقب">
        </div>

        <div class="form-group">
            <label for="phone">رقم الهاتف (واتساب):</label>
            <input type="tel" id="phone" required placeholder="213xxxxxxxx">
        </div>

        <div class="form-group">
            <label for="date">اختر تاريخ الحجز:</label>
            <input type="date" id="date" required>
            <div id="dateError" class="error-msg">❌ عذراً، هذا اليوم محجوز بالكامل! يرجى اختيار تاريخ آخر.</div>
        </div>

        <div class="form-group">
            <label for="period">فترة الحجز المفضلة:</label>
            <select id="period" required>
                <option value="">-- اختر الفترة --</option>
                <option value="morning">الفترة الصباحية (10:00 - 15:00) - 5000 دج </option>
                <option value="evening">الفترة المسائية (16:00 - 22:00) - 5000 دج </option>
                <option value="full">يوم كامل (12:00 - 22:00) - 8000 دج </option>
            </select>
        </div>

        <div class="form-group">
            <label>
                <input type="checkbox" required style="width: auto; margin-left: 10px;">
                أوافق على الشروط والأحكام (المسبح للعائلات فقط، 20 فرد على الأكثر، مراقبة الأطفال، عدم لمس الأشجار والنباتات، غلق الأبواب عند الخروج، إطفاء الإنارة وتفقد وغلق قارورات الغاز، الحفاظ على النظافة).
            </label>
        </div>

        <button type="submit" class="btn-submit">تأكيد الحجز المبدئي وتساب 💬</button>
    </form>
</div>

<script>
    // الأيام المحجوزة بصيغة (السنة-الشهر-اليوم) 
    const bookedDates = [
        "2026-06-11",
        "2026-06-12", 
        "2026-06-13", 
        "2026-06-19",
        "2026-06-25"
    ];

    // تفعيل المنع عند فتح الصفحة ومنع اختيار تواريخ قديمة
    const dateInput = document.getElementById('date');
    const today = new Date().toISOString().split('T')[0];
    dateInput.min = today; // منع اختيار أيام مرت في الماضي

    // عرض الأيام المحجوزة في القائمة العلوية للزبائن بشكل منظم
    const listContainer = document.getElementById('bookedDatesText');
    bookedDates.forEach(date => {
        let li = document.createElement('li');
        li.textContent = date;
        listContainer.appendChild(li);
    });

    // فحص التاريخ عند اختياره من قبل الزبون
    dateInput.addEventListener('input', function() {
        const errorMsg = document.getElementById('dateError');
        if (bookedDates.includes(this.value)) {
            errorMsg.style.display = 'block';
            this.value = ''; // مسح التاريخ الخاطئ فوراً
        } else {
            errorMsg.style.display = 'none';
        }
    });

    // عند إرسال النموذج
    document.getElementById('bookingForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        let name = document.getElementById('name').value;
        let phone = document.getElementById('phone').value;
        let date = document.getElementById('date').value;
        let period = document.getElementById('period').options[document.getElementById('period').selectedIndex].text;
        
        let message = `مرحباً، أود حجز المسبح المرجو تأكيد الحجز:\n\n👤 الاسم: ${name}\n📞 الهاتف: ${phone}\n📅 التاريخ: ${date}\n⏱️ الفترة: ${period}`;
        
        // رقم هاتفك الخاص بالصيغة الدولية التامة
        let myPhoneNumber = "213699007131"; 
        
        // الرابط المباشر والأقوى لفتح التطبيق فوراً في الهواتف
        let whatsappUrl = `whatsapp://send?phone=${myPhoneNumber}&text=${encodeURIComponent(message)}`;
        
        // محاولة فتح التطبيق مباشرة
        window.location.href = whatsappUrl;
        
        // الرابط البديل المصلح في حال لم يعمل الرابط المباشر على المتصفح أو الكمبيوتر
        setTimeout(function() {
            window.location.href = "https://wa.me" + myPhoneNumber + "?text=" + encodeURIComponent(message);
        }, 2000);
    });
</script>

</body>
</html>
